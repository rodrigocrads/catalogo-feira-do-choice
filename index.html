<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brechó do Choice</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/site.css">
    <link rel="stylesheet" href="css/paginacao.css">
</head>

<body>

    <div class="top-bar">
        <div class="top-bar-content">
            <a href="#" class="logo">
                Brechó do Choice
                <!-- <img src="imagens/logo/logo.png" alt="Brechó do Choice"> -->
            </a>
        </div>
    </div>

    <header class="hero">
        <div class="hero-content">
            <h1>Catálogo de Produtos</h1>
            <p>Peças incríveis com preços que cabem no bolso.</p>
            <p>Garanta já o seu!</p>
        </div>
    </header>

    <main class="container">

        <!-- <aside class="filtros">

            <h3>Filtrar Produtos</h3>

            <select id="categoria">
                <option value="">Todas categorias</option>
            </select>

            <select id="estado">
                <option value="">Todos estados</option>
                <option value="novo">Novo</option>
                <option value="seminovo">Seminovo</option>
                <option value="usado">Usado</option>
            </select>

            <input type="number" id="precoMin" placeholder="Preço mínimo">

            <input type="number" id="precoMax" placeholder="Preço máximo">

        </aside> -->

        <section class="conteudo">

            <div class="toolbar">
                <div class="campo-busca">
                    <input
                        type="text"
                        id="busca"
                        placeholder="Buscar produto">

                    <button
                        id="btnBuscar"
                        class="btn-busca"
                        aria-label="Buscar">

                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="18"
                            height="18"
                            fill="none"
                            viewBox="0 0 24 24">

                            <path
                                d="M21 21L16.65 16.65"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"/>

                            <circle
                                cx="11"
                                cy="11"
                                r="6"
                                stroke="currentColor"
                                stroke-width="2"/>

                        </svg>

                    </button>

                </div>
            </div>

            <div class="resultado-info">
                <span id="totalEncontrados"></span>
            </div>

            <div id="produtos" class="grid-produtos"></div>

            <nav id="paginacao" class="paginacao"></nav>
        </section>

    </main>

    <script src="js/api.js"></script>
    <script src="js/catalogo.js"></script>

</body>

</html>
